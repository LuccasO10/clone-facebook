<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/perfil.css">
    <title>Meu Perfil</title>
</head>
<body>
    <!-------------------------------TOPO MODERNO---------------------------------------------->
    <header class="topo">
        <div class="topo-overlay">
            <h1 class="nome">Luccas Dev</h1>
            <p class="tag">Desenvolvedor . Front-end</p>
            <a href="index.html" class="voltar">Voltar</a>
        </div>
    </header>

    <!---------------------------------CONTAINER PRINCIPAL------------------------------------->
    <main class="container">

    <!-------------------------------PERFIL CARD----------------------------------------------->
        <section class="perfil-card">
            <img src="assets/imagens/profile-luccas.png" class="avatar">
            <h2>luccas_og</h2>
            <p>Front-end em evolução</p>
        </section>

    <!-------------------------------GRID PRINCIPAL-------------------------------------------->
        <section class="grid">
    
    <!-------------------------------CARD PROJETOS--------------------------------------------->
        <div class="card">
            <h3>Projetos</h3>
            <p>Clone Facebook</p>
            <p>Meu GitHub</p>
            <p>Catálogos</p>
        </div>
        <!-------------------------- CARD TECNOLOGIAS ----------------------------------------->
        <div class="card">
            <h3>Tecnologias</h3>
            <p>HTML . CSS . JS</p>
        </div>

        <!--------------------------- CARD STATS ---------------------------------------------->
        <div class="card">
            <h3>Status</h3>
            <p>Em evolução constante</p>
        </div>
        
        <!----------------------teste-------->
        <div class="card terminal">
            <h3>Dev Panel</h3>
            <div class="terminal-body">
                <p><span class="prompt"></span>Inicializando Sistema...</p>
                <p><span class="prompt"></span>Carregando Projetos...</p>
                <!--<p><span class="prompt"></span>Executando scripts...</p>-->
                <p class="typing">Executando scripts...</p>
            </div>
        </div>

        </section>
    </main>

</body>
</html>
